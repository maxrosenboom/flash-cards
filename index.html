<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spanish Flashcard App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>Spanish Flashcards</h1>
        <label for="level-select">Choose a Level:</label>
        <select id="level-select" onchange="loadSelectedLevel()">
          <option value="EN-ES_level1.csv">Level 1</option>
          <option value="EN-ES_level2.csv">Level 2</option>
          <option value="EN-ES_simple_phrases.csv">Simple Phrases</option>
        </select>
        <button onclick="resetDeck()">Reset Deck</button>
      </div>
    <div id="flashcard-container"></div>
    <p id="card-count" class="card-count"></p> <!-- Display for unique cards left -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
